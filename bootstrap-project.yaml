apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: bootstrap
  namespace: argocd
spec:
  description: Bootstrap - manages ArgoCD projects and ApplicationSets
  sourceRepos:
    - https://github.com/kse-youpiteron-api-security/kse-labs-deployment.git
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: argoproj.io
      kind: AppProject
    - group: argoproj.io
      kind: ApplicationSet
    # Stand-alone Applications for charts/sources that don't fit the
    # infra ApplicationSet's directory generator (e.g. pure Helm
    # charts whose only YAML lives under templates/). See
    # argocd/applications/.
    - group: argoproj.io
      kind: Application
